<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{font-family: sans-serif; background: #7e7d70;}
        img{
            width:300px;
        }
        #cont{
            margin-top:100px;
            display: flex;
            gap:20px;
        }
        .prod{
            border:0.6px solid black;
            width:200px;
            padding:20px;
            text-align: center;
            font-weight: bolder;
            background-color: white;
        }
        h1{font-size: 4em;}

        .modal{
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.5);
        }

        .modal-contingut{
        background:white;
        width:400px;
        margin:15% auto;
        padding:20px;
        text-align: center;
        }
        #tracy{
            position:fixed;
            top:55%;
            left:70%;
        }
    </style>
</head>
<body>
    <h1><i class="fa-solid fa-paw"></i> (Paw)Mart</h1>
    <div id="cont">
        <div class="prod"><h2>Rare Candy </h2><button onclick="obrirModal(1)">Info</button></div>
        <div class="prod"><h2>Cat Food</h2><button onclick="obrirModal(2)">Info</button></div>
        <div class="prod"><h2>Cat Collar</h2><button onclick="obrirModal(3)">Info</button></div>
        <div id="modal1" class="modal">
            <div id="modal-contingut1" class="modal-contingut">
                <img src="Caramelo_raro_29.webp">
                <p>A must buy item for all cat-adventurers! It's chemicals make your cats evolve to the next level</p>
                <button onclick="tancarModal(1)">Close</button>
            </div>
        </div>
        <div id="modal2" class="modal">
            <div id="modal-contingut2" class="modal-contingut">
                <img src="1f4dfbb1-d89c-45b8-a5b3-70500bb34dba.db0ee671b1744c49dac7ebfde46bf38d.webp">
                <p>If your cats are hungry, this is the best way to stop them to eat each other!</p>
                <button onclick="tancarModal(2)">Close</button>
            </div>
        </div>
        <div id="modal3" class="modal">
            <div id="modal-contingut3" class="modal-contingut">
                <img src="Cheshire_WainReflectiveSafetyCatCollarMetallicSilver.webp">
                <p>Now you can have another collar! And your cats will look cutter!</p>
                <button onclick="tancarModal(3)">Close</button>
            </div>
        </div>
    </div>
    <img id="tracy" src="images.png"><img>
</body>
<script>
    function obrirModal(num){
        document.getElementById("modal"+num).style.display="block";
        }

        function tancarModal(num){
        document.getElementById("modal"+num).style.display="none";
        }
</script>
</html>
