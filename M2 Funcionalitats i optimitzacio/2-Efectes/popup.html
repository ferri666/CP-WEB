<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .popup{
        display:none;
        position:fixed;
        top:40%;
        left:40%;
        background:white;
        padding:20px;
        border:1px solid black;
    }</style>
</head>
<body>
    <button onclick="mostrarPopup()">Mostrar missatge</button>
    <div id="popup" class="popup">
    <p>Aquest és un missatge emergent</p>
    <button onclick="tancarPopup()">Tancar</button>
    </div>

    <script>
        function mostrarPopup(){
        document.getElementById("popup").style.display="block";
        }

        function tancarPopup(){
        document.getElementById("popup").style.display="none";
        }
    </script>
</body>
</html>
