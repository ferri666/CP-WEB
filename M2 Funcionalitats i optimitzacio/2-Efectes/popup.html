<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body{display:flex; margin-top:10%; justify-content: center; align-items:center; background-color: darkcyan; font-family: sans-serif;}
        #pop{text-align: center; border-radius: 25px; width:400px; background-color: azure; padding:10px;line-height: 1.6em; height: 400px; box-shadow: 0px 0px 10px black;}
        .pasti{border-radius: 10px;text-align: left; background-color: antiquewhite; line-height:1.6em; padding: 12px; margin:20px;}
        button{ background-color: blue; color:white; border-radius: 5px; padding:10px; font-size: 1em;}
        h1{color: rgb(0, 68, 188);}
        .fa-solid{margin-right: 15px; font-size: 1.3em;}
    </style>
</head>
<body>
    <div id="pop" class="animate__animated animate__bounceInUp animate__slow">
        <h1  class="animate__animated animate__pulse animate__infinite animate__delay-2s">Serveis digitals</h1>
        <p>Bla Bla Bla Bla </p>
            <div class="pasti"><i class="fa-solid fa-globe" style="color: rgb(0, 68, 188);"></i>Disseny web</div>
            <div class="pasti"><i class="fa-solid fa-envelope" style="color: rgb(0, 68, 188);"></i>Correu professional</div>
            <div class="pasti"><i class="fa-solid fa-mobile-screen" style="color: rgb(0, 68, 188);"></i>Adaptació mòbil</div>
            <button>Més informació</button>
        </ul>
    </div>
</body>
</html>
