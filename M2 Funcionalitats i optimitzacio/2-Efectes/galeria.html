<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .galeria {
            display: flex;
            gap: 10px;
        }

        img
        {
            width:430px;
            object-fit: cover;
        }

        #crop:hover{
            width:400px;
            object-fit: contain;
        }

        figure{
            width:400px;
            height:280px;
            border-radius: 10px;
            overflow: hidden;
            border:2px solid black;
        }
        figcaption{
            padding:10px;
        }
        #zoom
        {
            transform: scale(100%);
            transition: transform 0.7s;
        }
        #zoom:hover{
            transform: scale(110%);
        }
        #cap{
            border-radius: 10px;
            background-color: ghostwhite;
            position: static;
            width:369px;
            top:222px;
            padding:10px;
            left:1042px;
            opacity: 0.0;
            transform: translateY(42px);
            transition: transform 0.8s;
        }

        figure:hover #cap{
            position: absolute;
            transform: translateY(0px);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="galeria">
        <figure>
            <img id="crop" src="1.jpg">
        </figure>
        <figure>
            <img id="zoom" src="2.jpg">
            <figcaption>AMPLIA</figcaption>
        </figure>
        <figure>
            <img id="text" src="playa.jfif">
            <p id="cap">Platja tranquil·la</p>
        </figure>
    </div>
</body>
</html>
