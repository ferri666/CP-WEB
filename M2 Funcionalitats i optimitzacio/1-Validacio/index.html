<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8">
    <title>Exemple Regex</title>
    <script>
      const regex=/\w+\@\w+\.\w+/g
      let cadena = prompt("Escriu")
      let result = cadena.match(regex)
      for (i=0; i < result.length; i++)
        console.log(result[i])
    </script>
  </head>
  <body>
    <h1>Consulta la consola (F12)</h1>
  </body>
</html>
