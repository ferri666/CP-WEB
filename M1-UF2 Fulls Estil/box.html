<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #02c6a8;
        }
        #container{
            background-color: #fabe01;
            width: 1100px;
            height: 500px;
            margin: 75px auto;
            padding: 75px;
        }
        #card{
            background-color: white;
            width: 500px;
            height:360px;
            margin:0 auto;
        }
        #head
        {
            background-color: red;
            color:white;
            font-weight: bolder;
        }
        #foot
        {
            background-color: blue;
            color:white;
            font-weight: bolder;
        }

        .task
        {
            height:60px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="card">
            <p class="task" id="head">YOUR TASKS (CLICK & HOLD TO REMOVE)</p>
            <p class="task">Task number one</p>
            <p class="task">Second Task</p>
            <p class="task">Third Task</p>
            <p class="task">Task number four</p>
            <p class="task" id="foot">+add new task</p>
        </div>
    </div>
</body>
</html>
