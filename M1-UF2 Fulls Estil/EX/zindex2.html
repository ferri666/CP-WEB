<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img
        {
            width:162px;
            height:225px;
            position: absolute;
        }

        div:hover .back
        {
            display:block;
        }

        .trap{
            z-index:5;
            top:300px;
            left:300px;
        }
        .sword{
            z-index:4;
            top:250px;
            left:250px;
        }
        .trini{
            z-index:3;
            top:200px;
            left:200px;
        }
        .hors{
            z-index:2;
            top:150px;
            left:150px;
        }
        .cald{
            z-index:1;
            top:100px;
            left:100px;
        }
        .back{
            display: none;
        }
    </style>
</head>
<body>
    <div>
        <img class="trap" src="1.webp" alt="">
        <img class="trap back" src="back.jfif">
    </div>
    <div>
        <img class="sword" src="2.webp" alt="">
        <img class="sword back" src="back.jfif">
    </div>
    <div>
        <img class="trini" src="3.webp" alt="">
        <img class="trini back" src="back.jfif">
    </div>
    <div>
        <img class="hors" src="4.webp" alt="">
        <img class="hors back" src="back.jfif">
    </div>
    <div>
        <img class="cald" src="5.webp" alt="">
        <img class="cald back" src="back.jfif">
    </div>

</body>
</html>
