<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
          width:300px;
          height:100px;
          position: absolute;
        }
        #non{
            position: static;
            z-index: auto;
            background-color: orange;
        }
        #pos1{
           
            left:200px;
            width:100px;
            top:30px;
            z-index: 100;
            background-color: red;
        }
        #pos2
        {
            left:50px;
            top:70px;
            z-index: 2;
            background-color: pink;
        }
        #pos3
        {
            left:200px;
            top:50px;
            z-index: 1;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div id="non"></div>
    <div id="pos1"></div>
    <div id="pos2"></div>
    <div id="pos3"></div>
</body>
</html>
