<!DOCTYPE html>
<html lang="en">
<head>

    <title>Piano</title>
    <link rel="stylesheet" href="styles/piano.css" >
</head>
<body>
    <h1>Piano</h1>
    <audio id="nota1"><source src="sounds/1. DO.mp3" type="audio/mpeg"></audio>
    <audio id="nota2"><source src="sounds/2. DOS.mp3" type="audio/mpeg"></audio>
    <audio id="nota3"><source src="sounds/3. RE.mp3" type="audio/mpeg"></audio>
    <audio id="nota4"><source src="sounds/4. RES.mp3" type="audio/mpeg"></audio>
    <audio id="nota5"><source src="sounds/5. MI.mp3" type="audio/mpeg"></audio>
    <audio id="nota6"><source src="sounds/6. FA.mp3" type="audio/mpeg"></audio>
    <audio id="nota7"><source src="sounds/7. FAS.mp3" type="audio/mpeg"></audio>
    <audio id="nota8"><source src="sounds/8. SOL.mp3" type="audio/mpeg"></audio>
    <audio id="nota9"><source src="sounds/9. SOLS.mp3" type="audio/mpeg"></audio>
    <audio id="nota10"><source src="sounds/10. LA.mp3" type="audio/mpeg"></audio>
    <audio id="nota11"><source src="sounds/11. LAS.mp3" type="audio/mpeg"></audio>
    <audio id="nota12"><source src="sounds/12. SI.mp3" type="audio/mpeg"></audio>
    <div class="cont-piano">
        <div class="tecla" onclick="tocarNota(1)">C<div class="btn">A</div></div>
        <div class="tecla" onclick="tocarNota(3)">D<div class="btn">S</div></div>
        <div class="tecla" onclick="tocarNota(5)">E<div class="btn">D</div></div>
        <div class="tecla" onclick="tocarNota(6)">F<div class="btn">F</div></div>
        <div class="tecla" onclick="tocarNota(8)">G<div class="btn">G</div></div>
        <div class="tecla" onclick="tocarNota(10)">A<div class="btn">H</div></div>
        <div class="tecla" onclick="tocarNota(12)">B<div class="btn">J</div></div>
        <div id="cont2" class="cont-piano">
            <div class="tecla black" onclick="tocarNota(2)">C#<div class="btn">W</div></div>
            <div id="dee" class="tecla black" onclick="tocarNota(4)">D#<div class="btn">E</div></div>
            <div id="eff" class="tecla black" onclick="tocarNota(7)">F#<div class="btn">T</div></div>
            <div id="gee" class="tecla black" onclick="tocarNota(9)">G#<div class="btn">Y</div></div>
            <div id="eie" class="tecla black" onclick="tocarNota(11)">A#<div class="btn">U</div></div>
        </div>
    </div>
    <script src="piano.js"></script>
