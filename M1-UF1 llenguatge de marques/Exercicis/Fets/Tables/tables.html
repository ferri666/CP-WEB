<html>

		<title>Test Tables</title>

	<body>
         <h1>Una Zelda en cada Celda</h1>
	<table border="10px" bgcolor="yellow">
        <tr bgcolor="green">
            <th>Zelda Chibi</th>
            <th>Zelda Normal</th>
            <th>Zelda 3D</th>
        </tr>
        <tr>
            <td><img src="zelda-echoes-of-wisdom-port.png" width="250px" height="340px"></td>
            <td bgcolor="white"><img src="Link_to_the_Past_Zelda.png" width="250px" height="340px"></td>

        </tr>
        <tr>
            <td><img src="Princess_Zelda_The_Minish_Cap.webp" width="250px" height="340px"></td>

            <td><img src="Zelda_29_SSB4.webp" width="250px" height="340px"></td>
        </tr>
    </table>
    <table cellpadding=10 cellspacing=40 border="10px" bgcolor="yellow">
        <tr bgcolor="green" height="30">
            <th rowspan="2">Zelda Chibi</th>
            <th>Zelda Normal</th>
            <th>Zelda 3D</th>
        </tr>
        <tr height="30"  width="80">
            <td valign="top">Cosa</td>
            <td valign="center">Cosa</td>
            <td valign="bottom">Cosa</td>
        </tr>
        <tr height="30" width="80">
            <td colspan="2" align="left">Cosa</td>
            <td align="center">Cosa</td>
            <td align="right">Cosa</td>
        </tr>
    </table>
