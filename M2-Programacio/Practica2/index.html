<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num1 = Number(prompt("Digues un número:"))
        let num2 = Number(prompt("Digues un altre número:"))
        let ope = prompt("Digues una operació (+, -, *, /):")
        if (ope=='+')
            console.log("Resultat:"+(num1+num2))
        else if (ope =='-')
            console.log("Resultat:"+(num1-num2))
        else if (ope =='*')
            console.log("Resultat:"+(num1*num2))
        else if (ope=='/')
            console.log("Resultat:"+ (num1/num2))
        else
            console.log("Operació no vàlida")


        let secret = Math.floor(Math.random() * 9) + 1;
        let user = 0;
        while (user!=secret)
        {
            user = Number(prompt("Digues un número del 1 al 9"))
            if (user > secret)
                alert("Més petit!")
            else if (user < secret)
                alert("Més gran!")
        }
        console.log("Felicitats! Has encertat!")

        let taula = Number(prompt("Digues un número per fer la taula"))
        for (i=1; i<11;i++)
            console.log(i +" x "+ taula+" = " + i *taula)
    </script>
</body>
</html>
