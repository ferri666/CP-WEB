<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8">
    <title>Primer Script</title>
    <script>
        let a = 10;
        let b = 3;
        console.log("Suma:", a + b);
        console.log("Resta:", a - b);
        console.log("Multiplicació:", a * b);
        console.log("Divisó:", a / b)
        console.log("Mòdul:", a % b);
        console.log("Comparació:", a < b);
    </script>
  </head>
  <body>
    <h1>Obre la consola del navegador amb F12</h1>
  </body>
</html>
